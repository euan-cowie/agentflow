[repo]
name = "acme-monorepo"
base_branch = "origin/main"
worktree_root = "{{agentflow_state_home}}/worktrees/{{repo_id}}"
branch_prefix = "af"
default_surface = "web"

[bootstrap]
commands = ["bun install --frozen-lockfile"]
env_files = [
  { from = "apps/web/.env.example", to = "apps/web/.env.local" },
  { from = "packages/api/.env.example", to = "packages/api/.env.local" },
]

[env]
sync_files = [
  { from = ".env", to = ".env" },
]
targets = [
  { path = "apps/web/.env.agentflow" },
  { path = "packages/api/.env.agentflow" },
]

[[ports.bindings]]
target = "apps/web/.env.agentflow"
key = "VITE_PORT"
start = 4101
end = 4199

[[ports.bindings]]
target = "packages/api/.env.agentflow"
key = "PORT"
start = 5101
end = 5199

[delivery]
remote = "origin"
sync_strategy = "rebase"
preflight = ["review", "verify"]
cleanup = "async"

[github]
enabled = true
draft_on_submit = true
merge_method = "auto"
auto_merge = true
delete_remote_branch = true
labels = ["agentflow"]

[linear]
api_key_env = "LINEAR_API_KEY"
credential_profile = "acme"
picker_scope = "assigned"
issue_sort = "state_then_updated"

[commands]
review = "bun run review"
verify_quick = "bun run verify:quick"
verify_web = "bun run verify:web"
verify_api = "bun run verify:api"

[agents.default]
runner = "codex"
command = "codex --no-alt-screen -s workspace-write -a on-request"
prime_prompt = "Read AGENTS.md and repo instructions, inspect the task context and relevant files, identify the likely verification path for the current surface, send a short status update with your plan, then wait for confirmation before editing."
resume_prompt = "Resume the current task, re-check AGENTS.md and local instructions if needed, inspect the current state and recent changes, send a short status update with your next-step plan, then wait for confirmation before editing."

[tmux]
session_name = "{{repo}}-{{task}}-{{id}}"

[[tmux.windows]]
name = "editor"
command = "nvim ."

[[tmux.windows]]
name = "web"
cwd = "apps/web"
env_files = [".env", "apps/web/.env.local", "apps/web/.env.agentflow"]
command = "bun run dev"

[[tmux.windows]]
name = "api"
cwd = "packages/api"
env_files = [".env", "packages/api/.env.local", "packages/api/.env.agentflow"]
command = "bun run dev"

[[tmux.windows]]
name = "verify"
command = "clear"

[[tmux.windows]]
name = "codex"
agent = "default"

[requirements]
binaries = ["git", "tmux", "codex", "gh", "bun", "nvim"]
mcp_servers = ["linear"]
